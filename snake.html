<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
</head>
<body>

<canvas id="canvas" width="400" height="400"></canvas>

<script>
class Snake{
    constructor(x, y, size){
        this.x = x
        this.y = y
        this.size = size
        this.tail = [{x:this.x, y:this.y}]
        this.rotateX = 0
        this.rotateY = 1
    }

    move(){
        let newRect;

        if (this.rotateX == 1){
            newRect = {
                x: this.tail[this.tail.length - 1].x + this.size,
                y: this.tail[this.tail.length - 1].y
            }

        } else if (this.rotateX == -1){
            newRect = {
                x: this.tail[this.tail.length - 1].x - this.size,
                y: this.tail[this.tail.length - 1].y
            }

        } else if (this.rotateY == 1){
            newRect = {
                x: this.tail[this.tail.length - 1].x,
                y: this.tail[this.tail.length - 1].y + this.size
            }

        } else if (this.rotateY == -1){
            newRect = {
                x: this.tail[this.tail.length - 1].x,
                y: this.tail[this.tail.length - 1].y - this.size
            }
        }

        this.tail.shift()
        this.tail.push(newRect)
    }
}

class Apple{
    constructor(){
        let isTouching;

        while(true){
            isTouching = false;

            this.x = Math.floor(Math.random() * canvas.width / snake.size) * snake.size
            this.y = Math.floor(Math.random() * canvas.height / snake.size) * snake.size

            for(let i = 0; i < snake.tail.length; i++){
                if(this.x == snake.tail[i].x && this.y == snake.tail[i].y){
                    isTouching = true
                }
            }

            this.size = snake.size
            this.color = "red"

            if(!isTouching){
                break;
            }
        }
    }
}

let canvas = document.getElementById("canvas")
let canvasContext = canvas.getContext('2d')

let snake = new Snake(20,20,20)
let apple = new Apple()

window.onload = () =>{
    gameLoop();
}

function gameLoop(){
    setInterval(show, 1000/10) // velocidad
}

function show(){
    update();
    draw();
}

function update(){
    canvasContext.clearRect(0,0, canvas.width, canvas.height)

    snake.move()
    eatApple()
    checkHitWall();
}

function checkHitWall(){
    let head = snake.tail[snake.tail.length -1]

    if(head.x < 0){
        head.x = canvas.width - snake.size
    } else if(head.x >= canvas.width){
        head.x = 0
    } else if(head.y < 0){
        head.y = canvas.height - snake.size
    } else if(head.y >= canvas.height){
        head.y = 0
    }
}

function eatApple(){
    let head = snake.tail[snake.tail.length -1]

    if(head.x == apple.x && head.y == apple.y){
        snake.tail.push({x: apple.x, y: apple.y})
        apple = new Apple();
    }
}

function draw(){
    createRect(0,0,canvas.width, canvas.height, "black")

    // snake
    for(let i = 0; i < snake.tail.length; i++){
        createRect(
            snake.tail[i].x + 2,
            snake.tail[i].y + 2,
            snake.size - 4,
            snake.size - 4,
            'white'
        )
    }

    // score
    canvasContext.font = "20px Arial"
    canvasContext.fillStyle = "#00FF42"
    canvasContext.fillText("Score: "+ (snake.tail.length -1), canvas.width -120, 20)

    // apple
    createRect(apple.x, apple.y, apple.size, apple.size, apple.color)
}

function createRect(x,y,width, height, color){
    canvasContext.fillStyle = color
    canvasContext.fillRect(x, y, width, height)
}

// controles
window.addEventListener("keydown", (event) =>{
    if(event.keyCode == 37 && snake.rotateX != 1){
        snake.rotateX = -1
        snake.rotateY = 0;

    } else if(event.keyCode == 38 && snake.rotateY != 1){
        snake.rotateX = 0
        snake.rotateY = -1;

    } else if(event.keyCode == 39 && snake.rotateX != -1){
        snake.rotateX = 1
        snake.rotateY = 0;

    } else if(event.keyCode == 40 && snake.rotateY != -1){
        snake.rotateX = 0
        snake.rotateY = 1;
    }
})
</script>

</body>
</html>
